<!-- Concordance brand head additions.

     Quarto wires the SVG favicon link via website.favicon, and OG/Twitter
     tags via website.image + website.description. This partial covers
     what Quarto does not auto-emit: PNG favicon fallbacks, apple-touch-
     icon, web-app-manifest, and theme-color.

     Paths are absolute against site-url because Quarto include-in-header
     content is included verbatim and does not get path-rewritten per
     page depth. If site-url changes, update these URLs to match. -->

<link rel="icon" type="image/png" sizes="16x16" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-48.png">
<link rel="icon" type="image/png" sizes="64x64" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-64.png">
<link rel="icon" type="image/png" sizes="96x96" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-96.png">
<link rel="icon" type="image/png" sizes="128x128" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/favicon-128.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/favicon/apple-touch-icon.png">
<link rel="manifest" href="https://ryanstraight.github.io/cybedtools/concordance/assets/branding/site.webmanifest">
