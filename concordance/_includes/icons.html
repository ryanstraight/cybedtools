<script>
(function () {
  function init() {
    var els = document.querySelectorAll('.schema-diagram .cyb-node, .schema-diagram .cyb-edge-label');
    els.forEach(function (el) {
      el.setAttribute('tabindex', '0');
      el.setAttribute('role', 'button');
      el.setAttribute('aria-pressed', 'false');
      el.addEventListener('click', function (e) {
        e.stopPropagation();
        var next = !el.classList.contains('show-tech');
        el.classList.toggle('show-tech', next);
        el.setAttribute('aria-pressed', String(next));
      });
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          el.click();
        }
      });
    });

    document.querySelectorAll('.schema-diagram').forEach(function (figure) {
      var btn = figure.querySelector('.toggle-all');
      if (!btn) return;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var willShowTech = !btn.classList.contains('all-tech');
        btn.classList.toggle('all-tech', willShowTech);
        btn.setAttribute('aria-pressed', String(willShowTech));
        var icon = btn.querySelector('.toggle-icon');
        var text = btn.querySelector('.toggle-text');
        if (icon) icon.textContent = willShowTech ? '▾' : '▸';
        if (text) text.textContent = willShowTech ? 'plain English' : 'schema names';
        figure.querySelectorAll('.cyb-node, .cyb-edge-label').forEach(function (el) {
          el.classList.toggle('show-tech', willShowTech);
          el.setAttribute('aria-pressed', String(willShowTech));
        });
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
