<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 700 792.82" width="700" height="792.82">
  <!--
    cybedtools hex sticker, pointy-top, hexb.in convention.
    Standard hex 600x692.82, viewBox padded 50 each side. Final PNG
    output is post-processed: cropped to the non-transparent bounding
    box and re-padded by an equal margin on every side so any image
    viewer renders the hex with symmetric breathing room (asymmetric
    padding from the rasterizer was making the bottom tip read as
    clipped).

    Design (Option A v4):
      - Wordmark with morpheme color split: 'cyb' cream, 'ed' sky-400,
        'tools' cream.
      - Motif: directed RDF triple (clockwise arrows, three filled
        nodes) at R=127.
      - ~35 px gap between title baseline and top-node, comfortable
        margin from motif to hex border on every side.

    Triangle geometry. Center (300, 445), R = 127. Vertices:
      top:           (300, 318)
      lower-right:   (410, 508.5)
      lower-left:    (190, 508.5)
    Node radius r = 30. Edge stroke 5 px.
  -->

  <defs>
    <marker id="arrow"
            viewBox="0 0 10 10"
            refX="10" refY="5"
            markerWidth="12" markerHeight="12"
            orient="auto-start-reverse"
            markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
  </defs>

  <!-- Main hex outline -->
  <polygon
    points="300,0 600,173.205 600,519.615 300,692.82 0,519.615 0,173.205"
    fill="#0F172A"
    stroke="#38BDF8"
    stroke-width="14"
    stroke-linejoin="round"/>

  <!-- Package name with morpheme-level color split, centered -->
  <text x="300" y="235"
        font-family="JetBrains Mono, Consolas, ui-monospace, monospace"
        font-weight="700"
        font-size="70"
        text-anchor="middle">
    <tspan fill="#E0F2FE">cyb</tspan><tspan fill="#38BDF8">ed</tspan><tspan fill="#E0F2FE">tools</tspan>
  </text>

  <!-- Three directed edges, clockwise -->
  <g stroke="#38BDF8" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="315" y1="343.98" x2="395" y2="482.52" marker-end="url(#arrow)"/>
    <line x1="380" y1="508.5"  x2="220" y2="508.5"  marker-end="url(#arrow)"/>
    <line x1="205" y1="482.52" x2="285" y2="343.98" marker-end="url(#arrow)"/>
  </g>

  <!-- Three nodes -->
  <g fill="#E0F2FE">
    <circle cx="300" cy="318"   r="30"/>
    <circle cx="410" cy="508.5" r="30"/>
    <circle cx="190" cy="508.5" r="30"/>
  </g>
</svg>
